<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nightlight Diary</title>
<style>
  body { margin:0; background:#0D1B24; color:#F5F1E8; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         display:flex; align-items:center; justify-content:center; min-height:100vh; padding:32px; }
  .wrap { max-width:640px; text-align:center; }
  h1 { color:#F4D35E; font-size:2.2rem; margin-bottom:0.5rem; }
  .tagline { color:#cfcfcf; font-size:1.1rem; margin-bottom:1.5rem; }
  .feature { color:#b8b8b8; font-size:0.95rem; margin:0.3rem 0; }
  a { color:#F4D35E; }
  .cta { display:inline-block; margin-top:1.5rem; padding:12px 28px; background:#F4D35E; color:#111;
          text-decoration:none; border-radius:10px; font-weight:600; }
  p { line-height:1.6; text-align:left; color:#d8d8d8; }
  h1 { text-align:center; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #F4D35E55 0%, #F4D35E00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">

        <h1>Nightlight Diary</h1>
        <p class="tagline">Log the environment factors present each night you slept.</p>
        <p class="feature">Free: Checklist log of light/noise/temp conditions per night</p>
        <p class="feature">Pro: Best-conditions summary based on your own sleep ratings — $4.99 one-time</p>
        <a class="cta" href="https://apps.apple.com">Get it on the App Store</a>
        
</div>
</body>
</html>
