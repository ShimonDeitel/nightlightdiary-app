name: Nightlightdiary
options:
  bundleIdPrefix: com.shimondeitel.environmentlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Nightlightdiary:
    type: application
    platform: iOS
    sources:
      - path: Nightlightdiary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.environmentlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Nightlightdiary/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  NightlightdiaryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NightlightdiaryTests
      - path: Nightlightdiary.storekit
    dependencies:
      - target: Nightlightdiary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.environmentlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  NightlightdiaryUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: NightlightdiaryUITests
    dependencies:
      - target: Nightlightdiary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.environmentlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Nightlightdiary:
    build:
      targets:
        Nightlightdiary: all
        NightlightdiaryTests: [test]
        NightlightdiaryUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Nightlightdiary.storekit
    test:
      config: Debug
      storeKitConfiguration: Nightlightdiary.storekit
      targets:
        - NightlightdiaryTests
        - NightlightdiaryUITests
    archive:
      config: Release
